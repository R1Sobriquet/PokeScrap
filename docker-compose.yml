services:
  # ---------------------------------------------------------------- db
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - appnet
    # Bound to localhost only — never exposed publicly.
    ports:
      - "127.0.0.1:${DB_PORT}:3306"

  # ----------------------------------------------------------- backend
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Catalogue de seed (watchlist.yaml) — lecture seule, fourni par l'utilisateur.
      - ./seed:/seed:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - appnet
    ports:
      - "127.0.0.1:${API_PORT}:8000"

  # --------------------------------------------------------- scheduler
  scheduler:
    build:
      # Construit depuis la racine pour partager ./backend/app.
      context: .
      dockerfile: scheduler/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Liveness fichier : le heartbeat (1/min) écrit /tmp/heartbeat.
      test: ["CMD", "python", "-c", "import os,time,sys; sys.exit(0 if os.path.exists('/tmp/heartbeat') and time.time()-os.path.getmtime('/tmp/heartbeat')<600 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - appnet
    # No ports — internal worker only.

  # --------------------------------------------------------------- bot
  bot:
    build:
      # Construit depuis la racine pour partager ./backend/app (dispatcher, services).
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; sys.exit(0 if os.path.exists('/tmp/heartbeat') and time.time()-os.path.getmtime('/tmp/heartbeat')<600 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - appnet
    # No ports — outbound Discord gateway only.

  # ----------------------------------------------------------- scraper
  scraper:
    build:
      # Construit depuis la racine pour partager ./backend/app (sourcing, matching).
      context: .
      dockerfile: scraper/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os,time,sys; sys.exit(0 if os.path.exists('/tmp/heartbeat') and time.time()-os.path.getmtime('/tmp/heartbeat')<600 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      # Persistance du contexte (cookies/storage_state) entre runs + screenshots debug.
      - ./scraper-state:/app/state
      - ./scraper-debug:/tmp/scraper-debug
    networks:
      - appnet
    # No ports — outbound only.

  # ---------------------------------------------------------- frontend
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${API_PORT}
    depends_on:
      - backend
    networks:
      - appnet
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:5173"

networks:
  appnet:
    driver: bridge

volumes:
  db_data:
